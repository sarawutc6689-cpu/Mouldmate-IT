<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouldmate Home | Red Modern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Sukhumvit Set', 'Kanit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 10% 20%, #1a0c0c 0%, #0a0505 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0e6e6;
            padding: 1.5rem;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient red glow effect */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(180, 40, 40, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .glass-card {
            background: rgba(18, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(220, 70, 70, 0.25);
            border-radius: 2.8rem;
            box-shadow: 0 30px 60px -15px rgba(180, 40, 40, 0.4), 0 0 0 1px rgba(220, 70, 70, 0.1) inset;
            max-width: 720px;
            width: 100%;
            padding: 3.8rem 3rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            position: relative;
            z-index: 2;
        }

        .glass-card:hover {
            border-color: rgba(230, 80, 80, 0.4);
            box-shadow: 0 40px 70px -15px rgba(200, 50, 50, 0.5);
            transform: translateY(-5px) scale(1.01);
        }

        /* Red animated gradient border */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #b03030, #8b1a1a, #d44, #b03030);
            border-radius: 2.9rem;
            z-index: -1;
            opacity: 0.3;
            filter: blur(8px);
            transition: opacity 0.5s;
        }

        .glass-card:hover::after {
            opacity: 0.6;
            filter: blur(12px);
        }

        .badge {
            display: inline-block;
            background: rgba(200, 60, 60, 0.18);
            color: #ff9f9f;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
            border: 1px solid rgba(220, 80, 80, 0.3);
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(150, 30, 30, 0.3);
        }

        h1 {
            font-size: 3.6rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #ffffff 0%, #ffb8b8 50%, #ff6b6b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(200, 50, 50, 0.3);
        }

        .subhead {
            font-size: 1.3rem;
            color: #d4b4b4;
            margin-bottom: 2.8rem;
            font-weight: 350;
            border-left: 4px solid #c03c3c;
            padding-left: 1.8rem;
            background: linear-gradient(90deg, rgba(180, 60, 60, 0.1), transparent);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin: 3rem 0 3.5rem;
        }

        .feature-item {
            background: rgba(150, 40, 40, 0.12);
            border: 1px solid rgba(200, 70, 70, 0.2);
            border-radius: 2rem;
            padding: 1.3rem 1.8rem;
            font-size: 1rem;
            font-weight: 400;
            color: #f0d0d0;
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(8px);
            transition: all 0.25s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .feature-item:hover {
            background: rgba(190, 60, 60, 0.25);
            border-color: rgba(230, 100, 100, 0.5);
            transform: translateX(6px) scale(1.02);
            box-shadow: 0 8px 20px rgba(160, 40, 40, 0.4);
        }

        .feature-item span {
            font-size: 1.7rem;
            filter: drop-shadow(0 0 5px rgba(230, 80, 80, 0.5));
        }

        .btn-modern {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: linear-gradient(145deg, #c03434, #a02020);
            color: white;
            font-weight: 650;
            font-size: 1.3rem;
            padding: 1.3rem 3rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px -8px #8b0000, 0 0 0 1px rgba(255, 150, 150, 0.3) inset;
            width: fit-content;
            margin: 0.5rem 0 2.2rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 180, 180, 0.3);
        }

        .btn-modern:hover {
            background: linear-gradient(145deg, #d43c3c, #b02828);
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 25px 40px -8px #a02525, 0 0 0 2px rgba(255, 160, 160, 0.5) inset;
        }

        .btn-modern:active {
            transform: scale(0.97) translateY(2px);
            box-shadow: 0 5px 15px -5px #8b0000;
        }

        .footer-note {
            font-size: 0.9rem;
            color: #b18888;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(200, 80, 80, 0.25);
            padding-top: 2rem;
            margin-top: 1rem;
        }

        .footer-note a {
            color: #dba0a0;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            background: rgba(150, 40, 40, 0.15);
            border: 1px solid rgba(200, 70, 70, 0.2);
        }

        .footer-note a:hover {
            color: #ffcaca;
            background: rgba(180, 50, 50, 0.3);
            border-color: #c55;
            gap: 0.8rem;
        }

        /* Floating red particles effect */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #c44;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(2px);
            animation: float 8s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { transform: translateY(-30px) translateX(10px); opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .glass-card { padding: 2.5rem 1.8rem; }
            h1 { font-size: 2.6rem; }
            .feature-grid { grid-template-columns: 1fr; }
            .btn-modern { width: 100%; justify-content: center; }
            .footer-note { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <!-- Floating particles for ambiance -->
    <div class="particle" style="top: 10%; left: 5%;"></div>

    <div class="particle" style="top: 40%; left: 20%; width: 3px; height: 3px; animation-duration: 6s;"></div>
    <div class="particle" style="top: 80%; left: 30%; animation-duration: 10s;"></div>

    <div class="glass-card">
        <div class="badge">✦ MOULDMATE RED EDITION</div>
        
        <h1>RED ZONE<br>WELCOME</h1>
        <div class="subhead">ระบบปฏิบัติการสำหรับทีม TOKAISOLIDTIRE<br>พร้อมเข้าสู่โหมดการทำงาน</div>

        <div class="feature-grid">
            <div class="feature-item"><span>⚡</span> ควบคุมแม่พิมพ์ความเร็วสูง</div>

            <div class="feature-item"><span>🔴</span> ระบบแจ้งเตือนสีแดง</div>
        </div>

        <a href="https://sarawutc6689-cpu.github.io/Mouldmate-Home/" class="btn-modern" target="_blank" rel="noopener noreferrer">
            <span>⏺</span> เข้าสู่ระบบพนักงาน
            <span style="font-size: 1.5rem;">▶</span>
        </a>

        <div class="footer-note">
            <span>🔴 RED SECURITY ·  เฉพาะพนักงาน</span>
            <a href="https://sarawutc6689-cpu.github.io/Mouldmate-Home/" target="_blank" rel="noopener noreferrer">
                <span>⭕</span> ศูนย์ช่วยเหลือ
            </a>
        </div>

        <div style="text-align: right; margin-top: 1.5rem; font-size: 0.75rem; color: #8f5e5e; letter-spacing: 1px;">
            MOULDMATE · RED CONCEPT
        </div>
    </div>
</body>
</html>
