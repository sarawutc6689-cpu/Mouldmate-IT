<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      padding: 16px;
      color: #2f3640;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      max-width: 450px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 { 
      text-align: center;
      margin-bottom: 20px;
      color: #273c75;
      font-size: 1.6rem;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #dcdde1;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input:focus {
      outline: none;
      border-color: #273c75;
    }

    .camera-box {
      width: 100%;
      min-height: 300px;
      background: #2f3640;
      border-radius: 12px;
      margin: 15px 0;
      overflow: hidden;
      position: relative;
    }

    #video {
      width: 100%;
      display: block;
    }

    .camera-placeholder {
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }

    button {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-in {
      background: #273c75;
      color: white;
    }

    .btn-out {
      background: #c23616;
      color: white;
    }

    .btn-camera {
      background: #00a8ff;
      color: white;
      margin-bottom: 10px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      text-align: center;
      padding: 10px;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 10px;
    }

    .success { background: #c8e6c9; color: #2e7d32; }
    .error { background: #ffcdd2; color: #c62828; }
    .warning { background: #fff3cd; color: #856404; }

    footer {
      text-align: center;
      margin-top: 20px;
      color: #7f8fa6;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>📸 ระบบลงเวลาทำงาน</h2>

    <input type="text" id="employee_id" placeholder="รหัสพนักงาน" onkeyup="lookupEmployee()">
    <div id="empName" style="margin-bottom: 10px; font-weight: bold; text-align: center;"></div>

    <button class="btn-camera" onclick="initCamera()" id="cameraBtn">
      📷 เปิดกล้อง
    </button>

    <div class="camera-box">
      <video id="video" autoplay playsinline style="display: none;"></video>
      <div id="cameraPlaceholder" class="camera-placeholder">
        <div style="font-size: 48px;">📷</div>
        <div id="cameraMessage">กดปุ่ม "เปิดกล้อง" เพื่อเริ่มใช้งาน</div>
      </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <div class="btn-group">
      <button class="btn-in" onclick="capture('IN')" id="btnIn" disabled>🟢 เข้างาน</button>
      <button class="btn-out" onclick="capture('OUT')" id="btnOut" disabled>🔴 ออกงาน</button>
    </div>

    <div id="status"></div>
  </div>

  <footer>
    <p>ระบบลงเวลานอกสถานที่ © 2026</p>
  </footer>

  <script>
    // ตัวแปร
    let cameraStream = null;
    let isCameraReady = false;

    // ดึง elements
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnIn = document.getElementById('btnIn');
    const btnOut = document.getElementById('btnOut');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraMessage = document.getElementById('cameraMessage');
    const cameraBtn = document.getElementById('cameraBtn');

    // ฟังก์ชันเริ่มต้นกล้อง (ไม่พึ่ง Apps Script)
    window.initCamera = function() {
      // ซ่อน/แสดง elements
      cameraPlaceholder.style.display = 'block';
      video.style.display = 'none';
      cameraMessage.innerText = 'กำลังขอสิทธิ์ใช้งานกล้อง...';
      
      // ปิดปุ่มบันทึกเวลาระหว่างรอ
      btnIn.disabled = true;
      btnOut.disabled = true;
      
      // หยุดกล้องเก่าถ้ามี
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      
      // ตรวจสอบว่าเบราว์เซอร์รองรับหรือไม่ [citation:1][citation:3]
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        cameraMessage.innerText = '❌ เบราว์เซอร์ไม่รองรับการใช้งานกล้อง';
        statusDiv.innerText = 'กรุณาใช้ Chrome, Safari หรือ Firefox';
        statusDiv.className = 'error';
        return;
      }
      
      // ขอสิทธิ์ใช้งานกล้อง [citation:5][citation:7]
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: 'user', // ใช้กล้องหน้า
          width: { ideal: 1280 },
          height: { ideal: 720 }
        } 
      })
      .then(function(stream) {
        cameraStream = stream;
        video.srcObject = stream;
        
        // รอให้ video พร้อม [citation:9]
        video.onloadedmetadata = function() {
          cameraPlaceholder.style.display = 'none';
          video.style.display = 'block';
          btnIn.disabled = false;
          btnOut.disabled = false;
          isCameraReady = true;
          
          statusDiv.innerText = '✅ กล้องพร้อมใช้งาน';
          statusDiv.className = 'success';
          
          // ซ่อนปุ่มเปิดกล้องหลังจากเปิดสำเร็จ
          cameraBtn.style.display = 'none';
        };
      })
      .catch(function(err) {
        console.error('Camera error:', err);
        
        // จัดการ error ต่างๆ [citation:3][citation:7]
        let errorMsg = 'ไม่สามารถเปิดกล้องได้';
        
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          errorMsg = '❌ ไม่ได้รับอนุญาตให้ใช้กล้อง';
          statusDiv.innerText = 'กรุณาอนุญาตการเข้าถึงกล้องในการตั้งค่า';
        } else if (err.name === 'NotFoundError') {
          errorMsg = '❌ ไม่พบกล้องในอุปกรณ์นี้';
        } else if (err.name === 'NotReadableError') {
          errorMsg = '❌ ไม่สามารถเข้าถึงกล้องได้ (อาจมีแอปอื่นใช้งานอยู่)';
        } else if (err.name === 'OverconstrainedError') {
          errorMsg = '❌ กล้องไม่รองรับความละเอียดที่ต้องการ';
        } else {
          errorMsg = '❌ เกิดข้อผิดพลาด: ' + err.message;
        }
        
        cameraMessage.innerText = errorMsg;
        statusDiv.className = 'error';
      });
    };

    // ฟังก์ชันถ่ายภาพและบันทึก
    window.capture = function(status) {
      const empId = document.getElementById('employee_id').value.trim();
      if (!empId) {
        statusDiv.innerText = '❌ กรุณากรอกรหัสพนักงาน';
        statusDiv.className = 'error';
        return;
      }
      
      if (!isCameraReady || !video.srcObject) {
        statusDiv.innerText = '❌ กรุณาเปิดกล้องก่อน';
        statusDiv.className = 'error';
        return;
      }
      
      statusDiv.innerText = '📍 กำลังหาตำแหน่ง...';
      statusDiv.className = 'warning';
      
      // ขอตำแหน่ง GPS
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          statusDiv.innerText = '📷 กำลังถ่ายรูป...';
          
          // ถ่ายรูปจาก video [citation:9]
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          // แปลงเป็น Base64 [citation:7]
          const imageData = canvas.toDataURL('image/jpeg', 0.8);
          const base64Data = imageData.split(',')[1];
          
          statusDiv.innerText = '⏳ กำลังบันทึก...';
          
          // ส่งข้อมูลไปยัง Google Apps Script
          google.script.run
            .withSuccessHandler(function(res) {
              if (res.result === 'success') {
                statusDiv.innerText = '✅ ' + res.message;
                statusDiv.className = 'success';
                
                // เคลียร์ข้อมูล
                document.getElementById('employee_id').value = '';
                document.getElementById('empName').innerText = '';
              } else {
                statusDiv.innerText = '❌ ' + res.message;
                statusDiv.className = 'error';
              }
            })
            .withFailureHandler(function(err) {
              console.error(err);
              statusDiv.innerText = '❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์';
              statusDiv.className = 'error';
            })
            .saveAttendance({
              employee_id: empId,
              status: status,
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              image: base64Data
            });
        },
        function(err) {
          console.error('GPS Error:', err);
          statusDiv.innerText = '❌ ไม่สามารถระบุตำแหน่งได้';
          statusDiv.className = 'error';
          
          if (err.code === 1) {
            alert('กรุณาอนุญาตให้แอปเข้าถึงตำแหน่งที่ตั้ง');
          }
        },
        {
          enableHighAccuracy: true,
          timeout: 10000
        }
      );
    };

    // ค้นหาพนักงาน
    window.lookupEmployee = function() {
      const empId = document.getElementById('employee_id').value.trim();
      const empName = document.getElementById('empName');
      
      if (!empId) {
        empName.innerText = '';
        return;
      }
      
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.result === 'success') {
            empName.innerText = '👤 ' + res.name + ' (' + res.department + ')';
            empName.style.color = 'green';
          } else {
            empName.innerText = '❌ ' + res.message;
            empName.style.color = 'red';
          }
        })
        .withFailureHandler(function() {
          empName.innerText = '❌ ไม่สามารถเชื่อมต่อ';
          empName.style.color = 'red';
        })
        .getEmployeeName(empId);
    };

    // ตรวจสอบ In-App Browser
    (function checkInAppBrowser() {
      const ua = navigator.userAgent;
      const inApp = (
        ua.includes('FBAN') || 
        ua.includes('FBAV') || 
        ua.includes('Instagram') || 
        ua.includes('Line') ||
        ua.includes('Messenger')
      );
      
      if (inApp) {
        const warning = document.createElement('div');
        warning.className = 'warning';
        warning.style.padding = '10px';
        warning.style.margin = '10px 0';
        warning.style.borderRadius = '8px';
        warning.innerHTML = '⚠️ กรุณากด ⋮ แล้วเลือก "เปิดในเบราว์เซอร์"';
        document.querySelector('.card').prepend(warning);
      }
    })();
  </script>
</body>
</html>
