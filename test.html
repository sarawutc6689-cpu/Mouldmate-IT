<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      padding: 16px;
      color: #2f3640;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      max-width: 450px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 { 
      text-align: center;
      margin-bottom: 20px;
      color: #273c75;
      font-size: 1.6rem;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #dcdde1;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input:focus {
      outline: none;
      border-color: #273c75;
    }

    .camera-box {
      width: 100%;
      min-height: 300px;
      background: #2f3640;
      border-radius: 12px;
      margin: 15px 0;
      overflow: hidden;
      position: relative;
    }

    #video {
      width: 100%;
      display: block;
    }

    .camera-placeholder {
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }

    button {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-in {
      background: #273c75;
      color: white;
    }

    .btn-out {
      background: #c23616;
      color: white;
    }

    .btn-camera {
      background: #00a8ff;
      color: white;
      margin-bottom: 10px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      text-align: center;
      padding: 10px;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 10px;
    }

    .success { background: #c8e6c9; color: #2e7d32; }
    .error { background: #ffcdd2; color: #c62828; }
    .warning { background: #fff3cd; color: #856404; }

    footer {
      text-align: center;
      margin-top: 20px;
      color: #7f8fa6;
      font-size: 0.8rem;
    }
    
    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 10px;
      background: #f0f4f8;
      border: 2px solid #dcdde1;
      color: #2f3640;
    }
    
    .mode-btn.active {
      background: #273c75;
      color: white;
      border-color: #273c75;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>📸 ระบบลงเวลาทำงาน</h2>

    <div class="mode-selector">
      <button class="mode-btn active" onclick="setMode('gas')" id="modeGas">🔗 Apps Script</button>
      <button class="mode-btn" onclick="setMode('api')" id="modeApi">🌐 Web API</button>
    </div>

    <input type="text" id="employee_id" placeholder="รหัสพนักงาน" onkeyup="lookupEmployee()">
    <div id="empName" style="margin-bottom: 10px; font-weight: bold; text-align: center;"></div>

    <button class="btn-camera" onclick="initCamera()" id="cameraBtn">
      📷 เปิดกล้อง
    </button>

    <div class="camera-box">
      <video id="video" autoplay playsinline style="display: none;"></video>
      <div id="cameraPlaceholder" class="camera-placeholder">
        <div style="font-size: 48px;">📷</div>
        <div id="cameraMessage">กดปุ่ม "เปิดกล้อง" เพื่อเริ่มใช้งาน</div>
      </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <div class="btn-group">
      <button class="btn-in" onclick="capture('IN')" id="btnIn" disabled>🟢 เข้างาน</button>
      <button class="btn-out" onclick="capture('OUT')" id="btnOut" disabled>🔴 ออกงาน</button>
    </div>

    <div id="status"></div>
    
    <div id="apiUrlSection" style="display: none; margin-top: 15px;">
      <input type="text" id="apiUrl" placeholder="https://your-api.com/endpoint" value="https://script.google.com/macros/s/AKfycbwp-Z98V_bMxBz_mK6inPwCzwswM6oKFK8uOIp0DGWejCsdVPuxb24R7Zx9N6so8ldpkQ/exec">
      <small style="color: #666;">URL สำหรับ Web API mode</small>
    </div>
  </div>

  <footer>
    <p>ระบบลงเวลานอกสถานที่ © 2026</p>
  </footer>

  <script>
    // ตัวแปร
    let cameraStream = null;
    let isCameraReady = false;
    let currentMode = 'gas'; // 'gas' หรือ 'api'
    
    // URL ของ Google Apps Script (deploy เป็น web app)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwp-Z98V_bMxBz_mK6inPwCzwswM6oKFK8uOIp0DGWejCsdVPuxb24R7Zx9N6so8ldpkQ/exec';
    const GAS_DASHBOARD = 'https://script.google.com/macros/s/AKfycbyJslMzmKGjaYVCHPyXftM213Tbz40XupO5dBCidsYqMgAqQl_H587OcelnbTzmsIgt/exec';

    // ดึง elements
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnIn = document.getElementById('btnIn');
    const btnOut = document.getElementById('btnOut');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraMessage = document.getElementById('cameraMessage');
    const cameraBtn = document.getElementById('cameraBtn');
    const apiUrlSection = document.getElementById('apiUrlSection');
    const modeGas = document.getElementById('modeGas');
    const modeApi = document.getElementById('modeApi');

    // เปลี่ยนโหมดการทำงาน
    window.setMode = function(mode) {
      currentMode = mode;
      
      // อัปเดตปุ่ม
      modeGas.className = mode === 'gas' ? 'mode-btn active' : 'mode-btn';
      modeApi.className = mode === 'api' ? 'mode-btn active' : 'mode-btn';
      
      // แสดง/ซ่อน URL input
      apiUrlSection.style.display = mode === 'api' ? 'block' : 'none';
      
      statusDiv.innerText = mode === 'gas' ? 
        '🔗 ใช้ Google Apps Script โดยตรง' : 
        '🌐 ใช้ Web API (ต้องตั้งค่า URL)';
      statusDiv.className = 'warning';
    };

    // ฟังก์ชันเริ่มต้นกล้อง
    window.initCamera = function() {
      cameraPlaceholder.style.display = 'block';
      video.style.display = 'none';
      cameraMessage.innerText = 'กำลังขอสิทธิ์ใช้งานกล้อง...';
      
      btnIn.disabled = true;
      btnOut.disabled = true;
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        cameraMessage.innerText = '❌ เบราว์เซอร์ไม่รองรับการใช้งานกล้อง';
        return;
      }
      
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        } 
      })
      .then(function(stream) {
        cameraStream = stream;
        video.srcObject = stream;
        
        video.onloadedmetadata = function() {
          cameraPlaceholder.style.display = 'none';
          video.style.display = 'block';
          btnIn.disabled = false;
          btnOut.disabled = false;
          isCameraReady = true;
          
          statusDiv.innerText = '✅ กล้องพร้อมใช้งาน';
          statusDiv.className = 'success';
          cameraBtn.style.display = 'none';
        };
      })
      .catch(function(err) {
        console.error('Camera error:', err);
        
        let errorMsg = 'ไม่สามารถเปิดกล้องได้';
        
        if (err.name === 'NotAllowedError') {
          errorMsg = '❌ ไม่ได้รับอนุญาตให้ใช้กล้อง';
        } else if (err.name === 'NotFoundError') {
          errorMsg = '❌ ไม่พบกล้องในอุปกรณ์นี้';
        } else if (err.name === 'NotReadableError') {
          errorMsg = '❌ ไม่สามารถเข้าถึงกล้องได้';
        } else {
          errorMsg = '❌ ' + err.message;
        }
        
        cameraMessage.innerText = errorMsg;
      });
    };

    // ฟังก์ชันบันทึกข้อมูล
    function saveAttendance(data) {
      if (currentMode === 'gas') {
        // ใช้ google.script.run (ต้องรันใน Apps Script)
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(function(res) {
              if (res.result === 'success') {
                statusDiv.innerText = '✅ ' + res.message;
                statusDiv.className = 'success';
                document.getElementById('employee_id').value = '';
                document.getElementById('empName').innerText = '';
              } else {
                statusDiv.innerText = '❌ ' + res.message;
                statusDiv.className = 'error';
              }
            })
            .withFailureHandler(function(err) {
              statusDiv.innerText = '❌ การเชื่อมต่อล้มเหลว';
              statusDiv.className = 'error';
            })
            .saveAttendance(data);
        } else {
          // ถ้าไม่มี google.script.run ให้เตือน
          statusDiv.innerText = '❌ ต้องรันผ่าน Google Apps Script';
          statusDiv.className = 'error';
        }
      } else {
        // ใช้ Fetch API ส่งไปยัง Webhook หรือ API
        const apiUrl = document.getElementById('apiUrl').value.trim();
        if (!apiUrl) {
          statusDiv.innerText = '❌ กรุณาระบุ URL';
          statusDiv.className = 'error';
          return;
        }
        
        fetch(apiUrl, {
          method: 'POST',
          mode: 'no-cors', // สำหรับ Google Apps Script
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data)
        })
        .then(() => {
          statusDiv.innerText = '✅ ส่งข้อมูลสำเร็จ (แต่ไม่ได้รับการตอบกลับ)';
          statusDiv.className = 'success';
          
          // เคลียร์ข้อมูล
          document.getElementById('employee_id').value = '';
          document.getElementById('empName').innerText = '';
        })
        .catch(err => {
          statusDiv.innerText = '❌ ' + err.message;
          statusDiv.className = 'error';
        });
      }
    }

    // ฟังก์ชันถ่ายภาพ
    window.capture = function(status) {
      const empId = document.getElementById('employee_id').value.trim();
      if (!empId) {
        statusDiv.innerText = '❌ กรุณากรอกรหัสพนักงาน';
        statusDiv.className = 'error';
        return;
      }
      
      if (!isCameraReady || !video.srcObject) {
        statusDiv.innerText = '❌ กรุณาเปิดกล้องก่อน';
        statusDiv.className = 'error';
        return;
      }
      
      statusDiv.innerText = '📍 กำลังหาตำแหน่ง...';
      statusDiv.className = 'warning';
      
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          statusDiv.innerText = '📷 กำลังถ่ายรูป...';
          
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          const imageData = canvas.toDataURL('image/jpeg', 0.8);
          const base64Data = imageData.split(',')[1];
          
          statusDiv.innerText = '⏳ กำลังบันทึก...';
          
          // ส่งข้อมูล
          saveAttendance({
            employee_id: empId,
            status: status,
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            image: base64Data
          });
        },
        function(err) {
          statusDiv.innerText = '❌ ไม่สามารถระบุตำแหน่ง';
          statusDiv.className = 'error';
        },
        {
          enableHighAccuracy: true,
          timeout: 10000
        }
      );
    };

    // ค้นหาพนักงาน
    window.lookupEmployee = function() {
      const empId = document.getElementById('employee_id').value.trim();
      const empName = document.getElementById('empName');
      
      if (!empId) {
        empName.innerText = '';
        return;
      }
      
      if (currentMode === 'gas' && typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.result === 'success') {
              empName.innerText = '👤 ' + res.name + ' (' + res.department + ')';
              empName.style.color = 'green';
            } else {
              empName.innerText = '❌ ' + res.message;
              empName.style.color = 'red';
            }
          })
          .withFailureHandler(function() {
            empName.innerText = '❌ ไม่สามารถเชื่อมต่อ';
            empName.style.color = 'red';
          })
          .getEmployeeName(empId);
      } else {
        // โหมด API - อาจต้องเรียกผ่าน fetch
        empName.innerText = '👤 (โหมด API)';
        empName.style.color = 'blue';
      }
    };

    // ตรวจสอบว่ากำลังรันใน Apps Script หรือไม่
    if (typeof google !== 'undefined' && google.script) {
      // รันใน Apps Script
      document.body.insertAdjacentHTML('afterbegin', 
        '<div style="background: #4cd137; color: white; padding: 5px; text-align: center;">✅ กำลังรันใน Google Apps Script</div>'
      );
    } else {
      // รันใน Github Pages
      document.body.insertAdjacentHTML('afterbegin', 
        '<div style="background: #fbc531; color: #2f3640; padding: 5px; text-align: center;">⚠️ กำลังรันใน Github Pages - ใช้โหมด Web API</div>'
      );
      setMode('api'); // เปลี่ยนเป็นโหมด API อัตโนมัติ
    }
  </script>
</body>
</html>
